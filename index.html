<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Léïa Percherancier — Portfolio</title>
  <meta name="description" content="Portfolio de Léïa Percherancier — passionnée de l'image, entre code et créativité : jeux, mondes 3D et expériences web." />
  <meta name="theme-color" content="#05060a" />
  <!-- Aperçu de partage (OpenGraph / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Léïa Percherancier — Portfolio" />
  <meta property="og:description" content="Passionnée de l'image, entre code et créativité : jeux, mondes 3D et expériences web." />
  <meta property="og:image" content="/og.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Léïa Percherancier — Portfolio" />
  <meta name="twitter:description" content="Jeux, mondes 3D et expériences web — entre code et créativité." />
  <meta name="twitter:image" content="/og.jpg" />
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="noise-vig"></div>
  <div class="grain"></div>

  <div class="cur-dot"></div>
  <div class="cur-ring"><span class="lbl" id="curlbl">VOIR</span></div>

  <div class="wrap">
    <header class="top">
      <a class="mono-logo" href="#top" data-cursor>LP°</a>
      <nav class="r">
        <button class="lang" id="lang-toggle" aria-label="Changer de langue">
          <span data-l="fr">FR</span><span class="sep">/</span><span data-l="en">EN</span>
        </button>
        <a href="#travaux" id="nav-works" data-cursor>Travaux</a>
        <a href="#contact" id="nav-contact" data-cursor>Contact</a>
      </nav>
    </header>

    <section class="hero" id="top">
      <div class="role" id="role">Graphiste</div>
      <h1 class="name">
        <span class="ln l1"><i style="animation-delay:.15s">Léïa</i></span>
        <span class="ln l2"><i style="animation-delay:.28s">Percher<b>ancier</b></i></span>
      </h1>
      <p class="sub" id="tagline"></p>
    </section>

    <section class="index" id="travaux">
      <div class="eyebrow"><span id="works-eyebrow">Travaux sélectionnés</span></div>
      <div id="works"></div>
    </section>

    <section class="contact" id="contact">
      <span class="contact-eyebrow" id="contact-eyebrow">Un projet, une envie de collaborer ?</span>
      <a class="contact-btn" href="mailto:leiapercherancier@gmail.com" data-cursor="ÉCRIRE">
        <span class="contact-btn-ico">✉</span><span id="contact-btn-lbl">M'envoyer un email</span>
      </a>
      <a class="contact-mail" href="mailto:leiapercherancier@gmail.com" data-cursor="ÉCRIRE">leiapercherancier@gmail.com</a>
    </section>

    <footer class="foot" id="footer">
      <div id="footer-copy">© 2026 — Léïa Percherancier</div>
    </footer>
  </div>

  <div class="ticker" aria-hidden="true">
    <div class="tick-track" id="tick"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
